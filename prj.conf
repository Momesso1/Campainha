CONFIG_SETTINGS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_SETTINGS_NVS=y
CONFIG_ZBUS=y
CONFIG_SHELL=y
CONFIG_LOG=y
CONFIG_GPIO=y
CONFIG_GPIO_SHELL=y


CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Campainha"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_GATT_DYNAMIC_DB=y
CONFIG_INPUT=y
CONFIG_INPUT_GPIO_KEYS=y
CONFIG_ZBUS=y
CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# --- LED WS2812 via driver oficial ---
CONFIG_SPI=y
CONFIG_LED_STRIP=y

# --- DESATIVAR ECONOMIA DE ENERGIA ---
CONFIG_PM=n
CONFIG_PM_DEVICE=n

# --- MELHORAR A ESTABILIDADE DO BLUETOOTH ---
# Aumenta o número de buffers para pacotes L2CAP
CONFIG_BT_L2CAP_TX_BUF_COUNT=5

# Aumenta o tempo limite de supervisão da conexão
# Unidade: 10ms. Ex: 500 = 5 segundos. (Máximo: 3200)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=24
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=40
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=1000


